---
name: Generate Role Docs
'on':
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/replication/.aar_doc.yml
      - roles/replication/README.md
      - roles/replication/meta/argument_specs.yml
      - roles/replication/meta/main.yml
defaults:
  run:
    working-directory: 'trippsc2.dfs'
jobs:
  docs_replication:
    name: Generate replication role documentation
    permissions:
      contents: write
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: trippsc2.dfs
          ref: main
      - name: Generate replication role documentation
        working-directory: 'trippsc2.dfs'
        run: |
          source ~/venv/ansible-2.16/bin/activate
          cd ./roles/replication
          aar-doc . markdown
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add README.md || /bin/true
          git commit -m "Update replication role documentation." || /bin/true
          git push origin main
          deactivate
